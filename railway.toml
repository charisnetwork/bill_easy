# Railway Configuration for Bill Easy Monorepo
# This deploys frontend, backend, and admin as a single service

[build]
builder = "nixpacks"

[deploy]
startCommand = "node railway-monorepo.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Note: Environment variables should be set in Railway dashboard:
# - DATABASE_URL (PostgreSQL connection string)
# - JWT_SECRET (Secret key for JWT tokens)
# - RAZORPAY_KEY_ID & RAZORPAY_KEY_SECRET (Payment processing)
# - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS (Email notifications)
# - FRONTEND_URL (Your custom domain, e.g., https://yourdomain.com)
