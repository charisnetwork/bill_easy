services:
  # 1. Main Backend Web Service
  - type: web
    name: billeasy-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --force --legacy-peer-deps
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 2. Main Frontend Static Site
  - type: static
    name: billeasy-frontend
    runtime: static
    plan: free
    buildCommand: npm install --force --legacy-peer-deps && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://billeasy-backend.onrender.com # Update this if your backend service name is different
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
        status: 404
  # 3. Admin Backend Web Service
  - type: web
    name: billeasy-admin-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --force --legacy-peer-deps
    startCommand: npm start
    rootDir: admin/backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - key: DATABASE_URL_ADMIN
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - key: ADMIN_SECRET
        value: developer_secret_key_2026
      - key: NODE_ENV
        value: production

  # 4. Admin Frontend Static Site
  - type: static
    name: billeasy-admin-frontend
    runtime: static
    plan: free
    buildCommand: npm install --force --legacy-peer-deps && npm run build
    publishDir: dist
    rootDir: admin/frontend
    envVars:
      - key: VITE_ADMIN_BACKEND_URL
        value: https://billeasy-admin-backend.onrender.com # Update this if your admin backend name is different
      - key: VITE_ADMIN_SECRET
        value: developer_secret_key_2026
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
        status: 404

databases:
  # Unified Render PostgreSQL Database
  - name: billeasy-db
    plan: free
    region: oregon
