envVarGroups:
  - name: BillEasy-Secrets
    envVars:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: COMPANY_MOBILE
        sync: false
      - key: COMPANY_LOGO_URL
        sync: false

services:
  # 1. Main Backend (Node.js)
  - type: web
    name: billeasy-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --force --legacy-peer-deps
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - fromGroup: BillEasy-Secrets

  # 2. Main Frontend (Static Site)
  - type: web
    name: billeasy-frontend
    runtime: static
    plan: free
    buildCommand: npm install --force --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://billeasy-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 3. Admin Backend (Node.js)
  - type: web
    name: billeasy-admin-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --force --legacy-peer-deps
    startCommand: npm start
    rootDir: admin/backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL_SaaS
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - key: DATABASE_URL_ADMIN
        fromDatabase:
          name: billeasy-db
          property: connectionString
      - fromGroup: BillEasy-Secrets

  # 4. Admin Frontend (Static Site)
  - type: web
    name: billeasy-admin-frontend
    runtime: static
    plan: free
    buildCommand: npm install --force --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    rootDir: admin/frontend
    envVars:
      - key: VITE_ADMIN_BACKEND_URL
        value: https://billeasy-admin-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: billeasy-db
    plan: free
    region: frankfurt
